<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#080c14"/>
  <title>Reservas · Patio Olmos → Siglo 21</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080c14;
      --bg2:       #0f1522;
      --bg3:       #161e30;
      --border:    rgba(255,255,255,.08);
      --border2:   rgba(255,255,255,.15);
      --amber:     #f0a500;
      --amber-dim: rgba(240,165,0,.12);
      --green:     #22c55e;
      --green-dim: rgba(34,197,94,.12);
      --red:       #ef4444;
      --text:      #f0f4ff;
      --text2:     #8494b0;
      --text3:     #4a5a72;
    }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ── Grain ── */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    }

    /* ═══════════════════════════════════════════
       HEADER — compacto en móvil
    ═══════════════════════════════════════════ */
    header {
      position: sticky; top: 0; z-index: 100;
      padding: 12px 16px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,12,20,.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .logo-icon {
      width: 34px; height: 34px; flex-shrink: 0;
      background: var(--amber); border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      box-shadow: 0 0 16px rgba(240,165,0,.4);
    }
    .logo-text h1 {
      font-family: 'Syne', sans-serif;
      font-size: .9rem; font-weight: 800; line-height: 1.2;
    }
    .logo-text p { font-size: .68rem; color: var(--text2); }
    .header-admin {
      margin-left: auto; padding: 6px 12px;
      font-size: .72rem; color: var(--text3);
      text-decoration: none; border: 1px solid var(--border);
      border-radius: 8px; white-space: nowrap;
      transition: color .2s, border-color .2s;
    }
    .header-admin:hover { color: var(--text2); border-color: var(--border2); }

    /* ═══════════════════════════════════════════
       STEPS — sin texto en móvil chico
    ═══════════════════════════════════════════ */
    .steps {
      position: relative; z-index: 5;
      display: flex; align-items: flex-start;
      padding: 16px 16px 0;
      max-width: 560px; margin: 0 auto;
    }
    .step-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 5px; position: relative;
    }
    .step-item::after {
      content: ''; position: absolute;
      top: 13px; left: calc(50% + 16px);
      width: calc(100% - 32px); height: 1px;
      background: var(--border); transition: background .4s;
    }
    .step-item:last-child::after { display: none; }
    .step-item.done::after { background: var(--green); }
    .step-item.active::after { background: var(--amber); }

    .step-num {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--bg3); border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: .68rem; font-weight: 700; color: var(--text3);
      transition: all .3s; flex-shrink: 0;
    }
    .step-item.active .step-num {
      background: var(--amber); border-color: var(--amber); color: #000;
      box-shadow: 0 0 12px rgba(240,165,0,.5);
    }
    .step-item.done .step-num {
      background: var(--green); border-color: var(--green); color: #000;
    }
    .step-label {
      font-size: .6rem; font-weight: 600; color: var(--text3);
      text-transform: uppercase; letter-spacing: .05em;
    }
    .step-item.active .step-label { color: var(--amber); }
    .step-item.done  .step-label  { color: var(--green); }

    /* ═══════════════════════════════════════════
       CONTAINER & CARDS
    ═══════════════════════════════════════════ */
    .container {
      position: relative; z-index: 5;
      max-width: 560px; margin: 0 auto;
      padding: 16px 12px 80px;
    }

    .card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 18px; padding: 18px 16px;
      margin-bottom: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.4);
      animation: slideUp .3s ease both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: .95rem; font-weight: 700;
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-title .icon {
      width: 28px; height: 28px; border-radius: 7px; flex-shrink: 0;
      background: var(--amber-dim); border: 1px solid rgba(240,165,0,.2);
      display: flex; align-items: center; justify-content: center;
      font-size: .82rem;
    }

    /* ═══════════════════════════════════════════
       TRIP SELECTOR — grid uniforme, sin overflow
    ═══════════════════════════════════════════ */
    .date-label {
      font-size: .6rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--text3);
      margin: 14px 0 6px; padding-left: 2px;
    }
    .date-label:first-child { margin-top: 0; }

    /* Siempre 3 columnas iguales → caben en cualquier pantalla */
    .trips-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .trip-btn {
      background: var(--bg3); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 12px 6px;
      cursor: pointer; transition: all .18s; text-align: center;
      color: var(--text); min-height: 64px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .trip-btn:active { transform: scale(.96); }
    .trip-btn.selected {
      border-color: var(--amber); background: var(--amber-dim);
      box-shadow: 0 0 0 1px var(--amber);
    }
    .trip-btn:disabled { opacity: .3; cursor: not-allowed; }

    .trip-hora {
      font-family: 'Syne', sans-serif;
      font-size: 1.15rem; font-weight: 800;
      white-space: nowrap; line-height: 1;
    }
    .trip-seats { font-size: .65rem; font-weight: 600; }
    .seats-ok    { color: var(--green); }
    .seats-poco  { color: var(--amber); }
    .seats-lleno { color: var(--red);   }

    /* ═══════════════════════════════════════════
       INFO BAR
    ═══════════════════════════════════════════ */
    .info-bar {
      background: var(--amber-dim); border: 1px solid rgba(240,165,0,.2);
      border-radius: 10px; padding: 10px 12px;
      margin-bottom: 16px; font-size: .8rem; color: var(--text2);
      line-height: 1.4;
    }
    .info-bar strong { color: var(--amber); }

    /* ═══════════════════════════════════════════
       BUS SEAT MAP — 100% fluido, sin overflow
    ═══════════════════════════════════════════ */
    .bus-outer {
      display: flex; justify-content: center;
      padding: 0 4px;
    }

    .bus-body {
      width: 100%; max-width: 340px;
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 28px 28px 18px 18px;
      padding: 0 12px 16px;
      box-shadow: inset 0 -4px 16px rgba(0,0,0,.3);
    }

    .bus-windshield {
      background: linear-gradient(180deg, rgba(240,165,0,.12), transparent);
      margin: 0 -12px; padding: 10px 12px 12px;
      text-align: center; border-radius: 28px 28px 0 0;
      font-size: .58rem; font-weight: 700; letter-spacing: .14em;
      text-transform: uppercase; color: rgba(240,165,0,.5);
      border-bottom: 1px solid rgba(240,165,0,.12);
      margin-bottom: 10px;
    }

    .driver-row {
      display: flex; justify-content: flex-end;
      margin-bottom: 10px;
    }
    .driver-seat {
      width: 36px; height: 30px; border-radius: 7px;
      background: rgba(255,255,255,.04); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: .68rem;
    }

    /* Grid de asientos: 2 col + pasillo + 2 col
       Usamos fr para que sea 100% fluido */
    .seats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 10px 1fr 1fr;
      gap: 5px;
      align-items: center;
    }
    .aisle { /* pasillo vacío */ }

    .seat {
      /* Hacemos que el asiento sea cuadrado usando padding-bottom */
      position: relative;
      aspect-ratio: 1 / 1.05;
      border-radius: 8px 8px 5px 5px;
      border: none; cursor: pointer;
      font-size: .7rem; font-weight: 700;
      transition: all .14s;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      /* tap target mínimo 44px */
      min-height: 40px;
    }
    /* respaldo del asiento */
    .seat::before {
      content: ''; position: absolute;
      top: -5px; left: 20%; width: 60%; height: 5px;
      border-radius: 4px 4px 0 0;
      background: inherit; filter: brightness(.65);
    }
    .seat.libre {
      background: rgba(34,197,94,.13);
      border: 1.5px solid rgba(34,197,94,.3);
      color: var(--green);
    }
    .seat.libre:active {
      background: var(--green); color: #000;
      transform: scale(.94);
    }
    .seat.ocupado {
      background: rgba(239,68,68,.08);
      border: 1.5px solid rgba(239,68,68,.18);
      color: rgba(239,68,68,.3);
      cursor: not-allowed;
    }
    .seat.seleccionado {
      background: var(--amber); border-color: var(--amber); color: #000;
      box-shadow: 0 0 0 2px var(--bg3), 0 0 0 4px var(--amber);
    }

    /* En pantallas más grandes, hover funciona bien */
    @media (hover: hover) {
      .seat.libre:hover {
        background: var(--green); border-color: var(--green);
        color: #000; transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(34,197,94,.4);
      }
      .trip-btn:hover:not(:disabled) {
        border-color: var(--amber); background: var(--amber-dim);
        transform: translateY(-1px);
      }
    }

    .seat-legend {
      display: flex; gap: 12px; justify-content: center;
      margin-top: 14px; flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: .7rem; color: var(--text2); }
    .legend-dot  { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }

    /* ═══════════════════════════════════════════
       FORM
    ═══════════════════════════════════════════ */
    .form-group { margin-bottom: 14px; }
    label {
      font-size: .7rem; font-weight: 600; letter-spacing: .04em;
      text-transform: uppercase; color: var(--text2);
      display: block; margin-bottom: 6px;
    }
    input {
      width: 100%; padding: 13px 14px;
      background: var(--bg3); border: 1.5px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-size: 16px; /* evita zoom automático en iOS */
      font-family: 'Inter', sans-serif;
      transition: border-color .2s;
      -webkit-appearance: none;
    }
    input::placeholder { color: var(--text3); }
    input:focus { outline: none; border-color: var(--amber); }
    .input-note { font-size: .7rem; color: var(--text3); margin-top: 4px; }

    /* ═══════════════════════════════════════════
       RESUMEN
    ═══════════════════════════════════════════ */
    .summary-box {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px; margin-bottom: 16px;
    }
    .summary-row {
      display: flex; justify-content: space-between; align-items: baseline;
      font-size: .84rem; padding: 5px 0;
      border-bottom: 1px solid var(--border);
    }
    .summary-row:last-child { border-bottom: none; }
    .summary-row span:first-child { color: var(--text2); }
    .summary-row.total {
      margin-top: 4px; padding-top: 10px;
      font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
    }
    .summary-row.total span:last-child { color: var(--amber); }

    /* ═══════════════════════════════════════════
       BUTTONS — touch friendly (min 48px)
    ═══════════════════════════════════════════ */
    .btn {
      width: 100%; padding: 15px;
      border-radius: 12px; border: none;
      font-size: .95rem; font-weight: 700;
      cursor: pointer; transition: all .2s;
      font-family: 'Syne', sans-serif;
      min-height: 52px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn-primary {
      background: var(--amber); color: #000;
      box-shadow: 0 4px 18px rgba(240,165,0,.3);
    }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-mp {
      background: #009ee3; color: #fff;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 18px rgba(0,158,227,.3);
    }
    .btn-mp:active { transform: scale(.98); }
    .btn-mp:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .btn-ghost {
      background: transparent; color: var(--text2);
      border: 1.5px solid var(--border);
      margin-top: 8px;
    }
    .btn-ghost:active { background: rgba(255,255,255,.04); }

    @media (hover: hover) {
      .btn-primary:hover:not(:disabled) {
        background: #ffbe2e; transform: translateY(-1px);
        box-shadow: 0 6px 24px rgba(240,165,0,.4);
      }
      .btn-mp:hover:not(:disabled) {
        background: #0ab3ff; transform: translateY(-1px);
      }
      .btn-ghost:hover { border-color: var(--border2); color: var(--text); }
    }

    /* ═══════════════════════════════════════════
       PRICE PILL
    ═══════════════════════════════════════════ */
    .price-pill {
      margin-left: auto;
      background: var(--amber-dim); border: 1px solid rgba(240,165,0,.2);
      color: var(--amber); border-radius: 20px;
      font-size: .7rem; font-weight: 700; padding: 3px 9px;
      font-family: 'Syne', sans-serif; white-space: nowrap;
    }

    /* ═══════════════════════════════════════════
       TOAST
    ═══════════════════════════════════════════ */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--bg2); border: 1px solid var(--border2);
      color: var(--text); padding: 12px 20px;
      border-radius: 30px; font-size: .83rem; font-weight: 500;
      box-shadow: 0 8px 32px rgba(0,0,0,.5); z-index: 200;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap; max-width: calc(100vw - 32px);
      overflow: hidden; text-overflow: ellipsis;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: rgba(239,68,68,.4); color: var(--red); }

    /* ── Skeleton ── */
    .skel {
      background: linear-gradient(90deg, var(--bg3) 25%, rgba(255,255,255,.03) 50%, var(--bg3) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 10px; height: 64px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── Sections ── */
    .section { display: none; }
    .section.active { display: block; }

    /* ── Safe area bottom para iPhone con notch ── */
    .container { padding-bottom: max(80px, env(safe-area-inset-bottom, 80px)); }
  </style>
</head>
<body>

<header>
  <div class="logo-icon">🚌</div>
  <div class="logo-text">
    <h1>Reservas Transporte Pablo</h1>
    <p>Patio Olmos → Campus Siglo 21</p>
  </div>
  <a href="admin.html" class="header-admin">Admin</a>
</header>

<div class="steps">
  <div class="step-item active" id="step1">
    <div class="step-num">1</div>
    <span class="step-label">Viaje</span>
  </div>
  <div class="step-item" id="step2">
    <div class="step-num">2</div>
    <span class="step-label">Asiento</span>
  </div>
  <div class="step-item" id="step3">
    <div class="step-num">3</div>
    <span class="step-label">Datos</span>
  </div>
  <div class="step-item" id="step4">
    <div class="step-num">4</div>
    <span class="step-label">Pago</span>
  </div>
</div>

<div class="container">

  <!-- ── Paso 1: Viaje ── -->
  <div class="section active" id="sec-viaje">
    <div class="card">
      <div class="card-title">
        <div class="icon">🗓️</div>
        Elegí tu viaje
      </div>
      <div id="trips-container">
        <div class="trips-row">
          <div class="skel"></div>
          <div class="skel"></div>
          <div class="skel"></div>
        </div>
      </div>
    </div>
    <button class="btn btn-primary" id="btn-continuar-viaje" disabled>
      Continuar →
    </button>
  </div>

  <!-- ── Paso 2: Asiento ── -->
  <div class="section" id="sec-asiento">
    <div class="card">
      <div class="card-title">
        <div class="icon">💺</div>
        Elegí tu asiento
        <span class="price-pill" id="precio-pill">$0</span>
      </div>
      <div class="info-bar" id="trip-info-asiento"></div>
      <div class="bus-outer">
        <div class="bus-body">
          <div class="bus-windshield">🚌 FRENTE DEL TRANSPORTE</div>
          <div class="driver-row"><div class="driver-seat">🧑‍✈️</div></div>
          <div class="seats-grid" id="seats-grid"></div>
        </div>
      </div>
      <div class="seat-legend">
        <div class="legend-item">
          <div class="legend-dot" style="background:rgba(34,197,94,.2);border:1px solid rgba(34,197,94,.4)"></div>
          Libre
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:rgba(239,68,68,.15)"></div>
          Ocupado
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#f0a500"></div>
          Tuyo
        </div>
      </div>
    </div>
    <button class="btn btn-primary" id="btn-continuar-asiento" disabled>Continuar →</button>
    <button class="btn btn-ghost" onclick="goBack('sec-viaje',1)">← Volver</button>
  </div>

  <!-- ── Paso 3: Datos ── -->
  <div class="section" id="sec-datos">
    <div class="card">
      <div class="card-title"><div class="icon">👤</div>Tus datos</div>
      <div class="info-bar" id="trip-info-datos"></div>
      <div class="form-group">
        <label>Nombre completo *</label>
        <input type="text" id="inp-nombre" placeholder="Ej: María López"
          autocomplete="name" autocorrect="off" autocapitalize="words"/>
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" id="inp-email" placeholder="tu@email.com"
          autocomplete="email" inputmode="email"/>
        <div class="input-note">📩 Te llegará la confirmación aquí</div>
      </div>
      <div class="form-group">
        <label>Teléfono (opcional)</label>
        <input type="tel" id="inp-tel" placeholder="351 123 4567"
          autocomplete="tel" inputmode="tel"/>
      </div>
    </div>
    <button class="btn btn-primary" id="btn-continuar-datos">Continuar →</button>
    <button class="btn btn-ghost" onclick="goBack('sec-asiento',2)">← Volver</button>
  </div>

  <!-- ── Paso 4: Pago ── -->
  <div class="section" id="sec-pago">
    <div class="card">
      <div class="card-title"><div class="icon">✅</div>Confirmá tu reserva</div>
      <div class="summary-box" id="summary-box"></div>
      <button class="btn btn-mp" id="btn-pagar" onclick="confirmarYPagar()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
        </svg>
        Pagar con MercadoPago
      </button>
    </div>
    <button class="btn btn-ghost" onclick="goBack('sec-datos',3)">← Volver</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const state = { viaje: null, asiento: null, precio: 0 };

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 3500);
}

function setStep(n) {
  for (let i = 1; i <= 4; i++) {
    const el = document.getElementById('step' + i);
    el.className = 'step-item' + (i < n ? ' done' : i === n ? ' active' : '');
  }
}

function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack(section, step) { setStep(step); showSection(section); }

function fmtDate(d) {
  return new Date(d + 'T12:00:00').toLocaleDateString('es-AR',
    { weekday: 'short', day: 'numeric', month: 'short' });
}
function fmtPrecio(n) {
  return '$' + Number(n).toLocaleString('es-AR');
}

// ── Paso 1 ────────────────────────────────────────────────────
async function loadTrips() {
  try {
    const data = await fetch('/api/viajes').then(r => r.json());
    let html = '', lastDate = '';

    data.forEach(v => {
      if (v.fecha !== lastDate) {
        if (lastDate) html += '</div>';
        html += `<div class="date-label">${fmtDate(v.fecha)}</div><div class="trips-row">`;
        lastDate = v.fecha;
      }
      const d   = v.disponibles;
      const cls = d === 0 ? 'seats-lleno' : d <= 5 ? 'seats-poco' : 'seats-ok';
      const txt = d === 0 ? 'Lleno' : `${d} lugar${d === 1 ? '' : 'es'}`;
      html += `<button class="trip-btn" ${d === 0 ? 'disabled' : ''}
        onclick="selectTrip(${v.id},'${v.fecha}','${v.hora}',${d},this)">
        <div class="trip-hora">${v.hora}</div>
        <div class="trip-seats ${cls}">${txt}</div>
      </button>`;
    });
    if (lastDate) html += '</div>';

    document.getElementById('trips-container').innerHTML = html;
  } catch(e) {
    document.getElementById('trips-container').innerHTML =
      '<p style="color:var(--red);font-size:.82rem;padding:8px 0">⚠️ Error al cargar viajes. ¿El servidor está corriendo?</p>';
  }
}

function selectTrip(id, fecha, hora, disponibles, el) {
  document.querySelectorAll('.trip-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  state.viaje = { id, fecha, hora, disponibles };
  document.getElementById('btn-continuar-viaje').disabled = false;
}

document.getElementById('btn-continuar-viaje').addEventListener('click', async () => {
  if (!state.viaje) return;
  setStep(2); showSection('sec-asiento');
  await loadSeats(state.viaje.id);
});

// ── Paso 2 ────────────────────────────────────────────────────
async function loadSeats(viajeId) {
  const grid = document.getElementById('seats-grid');
  grid.innerHTML = '<div style="color:var(--text3);font-size:.78rem;padding:8px 0;grid-column:1/-1">Cargando asientos...</div>';

  const data = await fetch(`/api/viajes/${viajeId}/asientos`).then(r => r.json());
  state.precio = data.precio;
  document.getElementById('precio-pill').textContent = fmtPrecio(data.precio);

  const v = state.viaje;
  document.getElementById('trip-info-asiento').innerHTML =
    `📅 <strong>${fmtDate(v.fecha)}</strong> — <strong>${v.hora}hs</strong>`;

  let html = '';
  for (let i = 1; i <= 28; i++) {
    const col = (i - 1) % 4;
    if (col === 2) html += '<div class="aisle"></div>';
    const ocp = data.ocupados.includes(i);
    html += `<button class="seat ${ocp ? 'ocupado' : 'libre'}" ${ocp ? 'disabled' : ''}
      onclick="selectSeat(${i},this)" aria-label="Asiento ${i}">${i}</button>`;
  }
  grid.innerHTML = html;
}

function selectSeat(num, el) {
  document.querySelectorAll('.seat.seleccionado').forEach(s => {
    s.classList.remove('seleccionado'); s.classList.add('libre');
  });
  el.classList.remove('libre'); el.classList.add('seleccionado');
  state.asiento = num;
  document.getElementById('btn-continuar-asiento').disabled = false;
}

document.getElementById('btn-continuar-asiento').addEventListener('click', () => {
  if (!state.asiento) return;
  const v = state.viaje;
  document.getElementById('trip-info-datos').innerHTML =
    `📅 <strong>${fmtDate(v.fecha)}</strong> — <strong>${v.hora}hs</strong> · Asiento <strong>${state.asiento}</strong>`;
  setStep(3); showSection('sec-datos');
});

// ── Paso 3 ────────────────────────────────────────────────────
document.getElementById('btn-continuar-datos').addEventListener('click', () => {
  const nombre = document.getElementById('inp-nombre').value.trim();
  const email  = document.getElementById('inp-email').value.trim();
  if (!nombre) { showToast('Por favor ingresá tu nombre', true); return; }
  if (!email || !email.includes('@')) { showToast('Ingresá un email válido', true); return; }

  const v = state.viaje;
  document.getElementById('summary-box').innerHTML = `
    <div class="summary-row"><span>Ruta</span><span>Patio Olmos → Siglo 21</span></div>
    <div class="summary-row"><span>Fecha</span><span>${fmtDate(v.fecha)} ${v.hora}hs</span></div>
    <div class="summary-row"><span>Asiento</span><span>Nº ${state.asiento}</span></div>
    <div class="summary-row"><span>Pasajero</span><span>${nombre}</span></div>
    <div class="summary-row total"><span>Total</span><span>${fmtPrecio(state.precio)}</span></div>
  `;
  setStep(4); showSection('sec-pago');
});

// ── Paso 4 ────────────────────────────────────────────────────
async function confirmarYPagar() {
  const btn    = document.getElementById('btn-pagar');
  const nombre = document.getElementById('inp-nombre').value.trim();
  const email  = document.getElementById('inp-email').value.trim();
  const tel    = document.getElementById('inp-tel').value.trim();

  btn.disabled = true;
  btn.textContent = 'Procesando...';

  try {
    const res  = await fetch('/api/reservas', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        viaje_id: state.viaje.id, asiento: state.asiento,
        nombre, email, telefono: tel || null
      })
    });
    const data = await res.json();

    if (!res.ok) {
      showToast(data.error || 'Error al crear la reserva', true);
      btn.disabled = false;
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg> Pagar con MercadoPago`;
      return;
    }

    if (data.mp_url) {
      window.location.href = data.mp_url;
    } else {
      window.location.href = `/success?reserva_id=${data.reserva_id}&demo=1`;
    }
  } catch(e) {
    showToast('Error de conexión. Intentá de nuevo.', true);
    btn.disabled = false;
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg> Pagar con MercadoPago`;
  }
}

loadTrips();
</script>
</body>
</html>
