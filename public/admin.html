<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin · Reservas</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080c14; --bg2: #0f1522; --bg3: #161e30;
      --border: rgba(255,255,255,.08); --border2: rgba(255,255,255,.13);
      --amber: #f0a500; --amber2: #ffbe2e; --amber-dim: rgba(240,165,0,.1);
      --green: #22c55e; --green-dim: rgba(34,197,94,.1);
      --red: #ef4444; --red-dim: rgba(239,68,68,.1);
      --yellow: #eab308; --yellow-dim: rgba(234,179,8,.1);
      --text: #f0f4ff; --text2: #8494b0; --text3: #4a5a72;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    header {
      position: relative; z-index: 10;
      padding: 18px 28px; border-bottom: 1px solid var(--border);
      background: rgba(8,12,20,.85); backdrop-filter: blur(12px);
      display: flex; align-items: center; gap: 16px;
    }
    .logo-icon {
      width: 36px; height: 36px; background: var(--amber); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; box-shadow: 0 0 16px rgba(240,165,0,.35); flex-shrink: 0;
    }
    header h1 { font-family: 'Syne', sans-serif; font-size: .95rem; font-weight: 700; }
    header span { font-size: .75rem; color: var(--text2); margin-left: 4px; }

    .header-actions { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .refresh-btn {
      padding: 7px 14px; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text2); font-size: .78rem;
      cursor: pointer; font-family: 'Inter', sans-serif; transition: all .2s;
    }
    .refresh-btn:hover { border-color: var(--border2); color: var(--text); }
    .back-link { font-size: .78rem; color: var(--text3); text-decoration: none; transition: color .2s; }
    .back-link:hover { color: var(--text2); }

    main {
      position: relative; z-index: 5;
      max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px;
    }

    /* ── Stats ── */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,.3);
      animation: fadeIn .4s ease both;
    }
    .stat:nth-child(2) { animation-delay: .05s; }
    .stat:nth-child(3) { animation-delay: .1s; }
    .stat:nth-child(4) { animation-delay: .15s; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .stat-num { font-family: 'Syne', sans-serif; font-size: 2.2rem; font-weight: 800; line-height: 1; }
    .stat-label { font-size: .72rem; color: var(--text3); margin-top: 6px; text-transform: uppercase; letter-spacing: .08em; font-weight: 600; }
    .stat-total  .stat-num { color: var(--text); }
    .stat-pagada .stat-num { color: var(--green); }
    .stat-pend   .stat-num { color: var(--yellow); }
    .stat-canc   .stat-num { color: var(--red); }

    /* ── Filters ── */
    .filters {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px 20px;
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
      margin-bottom: 16px;
    }
    select, .search-input {
      padding: 9px 14px; background: var(--bg3); border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: .85rem;
      font-family: 'Inter', sans-serif; transition: border-color .2s;
    }
    select:focus, .search-input:focus { outline: none; border-color: var(--amber); }
    .search-input { flex: 1; min-width: 200px; }
    .search-input::placeholder { color: var(--text3); }
    option { background: var(--bg3); }

    .count-label { font-size: .78rem; color: var(--text3); margin-left: auto; }

    /* ── Table ── */
    .table-wrap {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,.4);
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: var(--bg3); }
    th {
      padding: 13px 16px; text-align: left;
      font-size: .68rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--text3);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td {
      padding: 13px 16px; font-size: .85rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr { transition: background .15s; }
    tbody tr:hover td { background: rgba(255,255,255,.025); }

    .td-id { font-family: 'Syne', sans-serif; font-size: .8rem; color: var(--text3); }
    .td-nombre { font-weight: 600; }
    .td-email { color: var(--text2); font-size: .8rem; }
    .td-hora { font-family: 'Syne', sans-serif; font-weight: 700; color: var(--amber); }
    .td-asiento {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: .9rem;
      color: var(--text);
    }

    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
    }
    .badge-pagada    { background: var(--green-dim);  color: var(--green);  border: 1px solid rgba(34,197,94,.2); }
    .badge-pendiente { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(234,179,8,.2); }
    .badge-cancelada { background: var(--red-dim);    color: var(--red);    border: 1px solid rgba(239,68,68,.2); }

    .empty { padding: 60px; text-align: center; color: var(--text3); }

    @media(max-width: 640px) {
      .hide-mobile { display: none; }
      .stat-num { font-size: 1.7rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-icon">🚌</div>
  <div>
    <h1>Panel de Administración <span>· Transporte Reservas</span></h1>
  </div>
  <div class="header-actions">
    <button class="refresh-btn" onclick="loadData()">↻ Actualizar</button>
    <a href="/" class="back-link">← App</a>
  </div>
</header>

<main>
  <div class="stats">
    <div class="stat stat-total">
      <div class="stat-num" id="s-total">—</div>
      <div class="stat-label">Total reservas</div>
    </div>
    <div class="stat stat-pagada">
      <div class="stat-num" id="s-pagadas">—</div>
      <div class="stat-label">Pagadas</div>
    </div>
    <div class="stat stat-pend">
      <div class="stat-num" id="s-pendientes">—</div>
      <div class="stat-label">Pendientes</div>
    </div>
    <div class="stat stat-canc">
      <div class="stat-num" id="s-canceladas">—</div>
      <div class="stat-label">Canceladas</div>
    </div>
  </div>

  <div class="filters">
    <select id="filtro-estado" onchange="filtrar()">
      <option value="">Todos los estados</option>
      <option value="pagada">✅ Pagadas</option>
      <option value="pendiente">⏳ Pendientes</option>
      <option value="cancelada">❌ Canceladas</option>
    </select>
    <input class="search-input" type="text" id="filtro-buscar"
      placeholder="Buscar por nombre o email..." oninput="filtrar()"/>
    <span class="count-label" id="count-label"></span>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Pasajero</th>
          <th class="hide-mobile">Email</th>
          <th>Fecha</th>
          <th>Hora</th>
          <th>Asiento</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="7" class="empty">Cargando...</td></tr>
      </tbody>
    </table>
  </div>
</main>

<script>
let allData = [];

async function loadData() {
  try {
    const res = await fetch('/api/admin/reservas');
    allData   = await res.json();
    updateStats();
    filtrar();
  } catch(e) {
    document.getElementById('tbody').innerHTML =
      '<tr><td colspan="7" class="empty">⚠️ Error al cargar datos</td></tr>';
  }
}

function updateStats() {
  document.getElementById('s-total').textContent      = allData.length;
  document.getElementById('s-pagadas').textContent    = allData.filter(r => r.estado === 'pagada').length;
  document.getElementById('s-pendientes').textContent = allData.filter(r => r.estado === 'pendiente').length;
  document.getElementById('s-canceladas').textContent = allData.filter(r => r.estado === 'cancelada').length;
}

function filtrar() {
  const estado = document.getElementById('filtro-estado').value;
  const buscar = document.getElementById('filtro-buscar').value.toLowerCase();
  let filtered = allData;
  if (estado)  filtered = filtered.filter(r => r.estado === estado);
  if (buscar)  filtered = filtered.filter(r =>
    r.nombre.toLowerCase().includes(buscar) || r.email.toLowerCase().includes(buscar));

  document.getElementById('count-label').textContent =
    filtered.length + ' resultado' + (filtered.length !== 1 ? 's' : '');

  const tbody = document.getElementById('tbody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">Sin resultados</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(r => {
    const fecha = r.fecha ? new Date(r.fecha + 'T12:00:00').toLocaleDateString('es-AR',
      { weekday: 'short', day: 'numeric', month: 'short' }) : '—';
    return `<tr>
      <td class="td-id">#${r.id}</td>
      <td class="td-nombre">${r.nombre}</td>
      <td class="td-email hide-mobile">${r.email}</td>
      <td>${fecha}</td>
      <td class="td-hora">${r.hora || '—'}</td>
      <td class="td-asiento">💺 ${r.asiento}</td>
      <td><span class="badge badge-${r.estado}">${r.estado}</span></td>
    </tr>`;
  }).join('');
}

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
